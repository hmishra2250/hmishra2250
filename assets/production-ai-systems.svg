<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Production AI systems loop</title>
  <desc id="desc">A compact dark systems strip showing planning, DAG execution, sandboxed analysis, judge checks, and artifacts.</desc>
  <rect width="1200" height="220" rx="24" fill="#080B12"/>
  <rect x="1" y="1" width="1198" height="218" rx="23" stroke="#293241"/>
  <circle cx="1080" cy="24" r="122" fill="#1D4ED8" opacity="0.16"/>
  <circle cx="98" cy="210" r="132" fill="#7C3AED" opacity="0.14"/>

  <text x="64" y="54" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" letter-spacing="3.5">SYSTEM SHAPE</text>
  <text x="64" y="89" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="800">LLM behavior inside reliable software boundaries</text>

  <g font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18">
    <rect x="64" y="121" width="140" height="42" rx="12" fill="#111827" stroke="#374151"/>
    <text x="89" y="148" fill="#A7F3D0">plan</text>
    <path d="M214 142H254" stroke="#64748B" stroke-width="2"/>
    <path d="M246 135L254 142L246 149" stroke="#64748B" stroke-width="2"/>

    <rect x="264" y="121" width="140" height="42" rx="12" fill="#111827" stroke="#374151"/>
    <text x="289" y="148" fill="#BFDBFE">DAG</text>
    <path d="M414 142H454" stroke="#64748B" stroke-width="2"/>
    <path d="M446 135L454 142L446 149" stroke="#64748B" stroke-width="2"/>

    <rect x="464" y="121" width="156" height="42" rx="12" fill="#111827" stroke="#374151"/>
    <text x="488" y="148" fill="#DDD6FE">sandbox</text>
    <path d="M630 142H670" stroke="#64748B" stroke-width="2"/>
    <path d="M662 135L670 142L662 149" stroke="#64748B" stroke-width="2"/>

    <rect x="680" y="121" width="140" height="42" rx="12" fill="#111827" stroke="#374151"/>
    <text x="704" y="148" fill="#FDE68A">judge</text>
    <path d="M830 142H870" stroke="#64748B" stroke-width="2"/>
    <path d="M862 135L870 142L862 149" stroke="#64748B" stroke-width="2"/>

    <rect x="880" y="121" width="180" height="42" rx="12" fill="#111827" stroke="#374151"/>
    <text x="905" y="148" fill="#FCA5A5">artifact</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="700">
    <rect x="64" y="179" width="165" height="28" rx="14" fill="#0F766E"/>
    <text x="85" y="198" fill="#ECFDF5">days to under 1h</text>
    <rect x="241" y="179" width="151" height="28" rx="14" fill="#1D4ED8"/>
    <text x="262" y="198" fill="#EFF6FF">10x infra cost</text>
    <rect x="404" y="179" width="143" height="28" rx="14" fill="#B45309"/>
    <text x="426" y="198" fill="#FFF7ED">93% to 98%</text>
  </g>
</svg>
